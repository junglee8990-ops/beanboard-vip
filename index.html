<!DOCTYPE html>
<html>
<head>
<title>Bean Board VIP</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body {
  margin: 0;
  font-family: Arial;
}

/* ===== HOME ===== */
#home {
  height: 100vh;
  background: linear-gradient(135deg,#1e1e1e,#3a2f2f);
  display: flex;
  justify-content: center;
  align-items: center;
  position: absolute;
  width: 100%;
  top: 0;
  transition: 0.8s;
  z-index: 2;
}

#home img {
  width: 250px;
  cursor: pointer;
}

/* ===== MENU PAGE ===== */
#menu {
  min-height: 200vh; /* allows scrolling */
  width: 100%;
  position: absolute;
  top: 100%;
  background: url('./bg.jpg') center/cover no-repeat;
  transition: 0.8s;
}

.overlay {
  background: rgba(0,0,0,0.7);
  min-height: 200vh;
  color: white;
}

/* ===== SECTION ===== */
.section {
  padding: 20px;
}

/* ===== HEADING ===== */
h1 {
  text-align: center;
}

/* ===== CATEGORY ===== */
.categories {
  display: flex;
  overflow-x: auto;
  gap: 10px;
  padding: 10px;
  justify-content: center;
}

.categories div {
  padding: 12px 22px;
  background: rgba(255,255,255,0.3);
  border-radius: 25px;
  cursor: pointer;
}

.categories div.active {
  background: white;
  color: black;
}

/* ===== SLIDER ===== */
.slider {
  position: relative;
  overflow: hidden;
}

.track {
  display: flex;
  transition: 0.5s;
}

/* ===== BIGGER CARD ===== */
.card {
  min-width: 90%;
  margin: 20px 5%;
  background: white;
  color: black;
  padding: 25px;
  border-radius: 20px;
  text-align: center;
}

.card img {
  width: 100%;
  border-radius: 15px;
}

.card h3 {
  font-size: 22px;
}

.card p {
  font-size: 20px;
  font-weight: bold;
}

/* ===== ARROWS ===== */
.arrow {
  position: absolute;
  top: 40%;
  background: black;
  color: white;
  padding: 10px;
  cursor: pointer;
  border-radius: 50%;
}

.left { left: 10px; }
.right { right: 10px; }

/* ===== CONTACT SECTION ===== */
.contact {
  text-align: center;
  padding: 40px 20px;
}

.contact a {
  display: block;
  margin: 10px;
  font-size: 18px;
  color: white;
  text-decoration: none;
}

/* ===== FOOTER ===== */
.footer {
  text-align: center;
  padding: 20px;
  font-weight: bold;
}

</style>
</head>

<body>

<!-- HOME -->
<div id="home">
  <img src="./logo.jpg" onclick="openMenu()">
</div>

<!-- MENU + CONTACT -->
<div id="menu">
  <div class="overlay">

    <!-- MENU SECTION -->
    <div class="section">
      <h1>Menu</h1>

      <div class="categories">
        <div onclick="load('hot',this)">Hot</div>
        <div onclick="load('cold',this)">Cold</div>
        <div onclick="load('food',this)">Food</div>
      </div>

      <div class="slider">
        <div class="arrow left" onclick="move(-1)">❮</div>
        <div class="arrow right" onclick="move(1)">❯</div>

        <div class="track" id="track">
          <h2 style="margin:auto">Click category ☕</h2>
        </div>
      </div>
    </div>

    <!-- CONTACT SECTION -->
    <div class="contact">

      <h2>Contact Us</h2>

      <a href="https://www.instagram.com/beanboard_vip?utm_source=ig_web_button_share_sheet&igsh=ZDNlZDc0MzIxNw==" target="_blank">
        Instagram 📸
      </a>

      <a href="https://maps.google.com" target="_blank">
        Location 📍
      </a>

      <p>📞 +91 1234567890</p>
      <p>📧 abc@gmail.com</p>

    </div>

    <!-- FOOTER -->
    <div class="footer">
      Bean Board VIP ☕
    </div>

  </div>
</div>

<script>

/* OPEN MENU */
function openMenu(){
  home.style.top="-100%";
  menu.style.top="0";
}

/* DATA */
let index=0;

let data={
  hot:[
    ["Espresso",100,"https://images.unsplash.com/photo-1511920170033-f8396924c348"],
    ["Latte",140,"https://images.unsplash.com/photo-1509042239860-f550ce710b93"]
  ],
  cold:[
    ["Cold Brew",210,"https://images.unsplash.com/photo-1461023058943-07fcbe16d735"],
    ["Mint Brew",160,"https://images.unsplash.com/photo-1517701604599-bb29b565090c"]
  ],
  food:[
    ["Fries",200,"https://images.unsplash.com/photo-1541592106381-b31e9677c0e5"],
    ["Sandwich",380,"https://images.unsplash.com/photo-1550547660-d9450f859349"]
  ]
}

/* LOAD */
function load(type,el){

  document.querySelectorAll(".categories div").forEach(x=>x.classList.remove("active"))
  el.classList.add("active")

  index=0

  let html=""

  data[type].forEach(item=>{
    html+=`
      <div class="card">
        <img src="${item[2]}">
        <h3>${item[0]}</h3>
        <p>₹${item[1]}</p>
      </div>
    `
  })

  track.innerHTML=html
  update()
}

/* MOVE */
function move(dir){
  index+=dir
  let total=document.querySelectorAll(".card").length
  if(index<0) index=0
  if(index>=total) index=total-1
  update()
}

/* UPDATE */
function update(){
  track.style.transform=`translateX(-${index*100}%)`
}

</script>

</body>
</html>
