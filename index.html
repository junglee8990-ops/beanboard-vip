<!DOCTYPE html>
<html>
<head>
<title>Bean Board VIP</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* ===== BODY ===== */
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  overflow: hidden;
}

/* ===== HOME PAGE ===== */
#home {
  height: 100vh;
  background: linear-gradient(135deg, #1e1e1e, #3a2f2f); /* aesthetic */
  display: flex;
  justify-content: center;
  align-items: center;
  position: absolute;
  width: 100%;
  top: 0;
  left: 0;
  transition: 0.8s;
  z-index: 2;
}

#home img {
  width: 240px;
  cursor: pointer;
  transition: 0.3s;
}

#home img:hover {
  transform: scale(1.1);
}

/* ===== MENU PAGE ===== */
#menu {
  height: 100vh;
  width: 100%;
  position: absolute;
  top: 100%;
  left: 0;
  background: url('./bg.jpg') center/cover no-repeat;
  transition: 0.8s;
}

/* DARK OVERLAY */
.overlay {
  background: rgba(0,0,0,0.65);
  height: 100%;
  color: white;
  display: flex;
  flex-direction: column;
}

/* ===== HEADER ===== */
.header {
  text-align: center;
  padding: 15px;
}

.header h1 {
  margin: 10px 0;
}

/* ===== LINKS (BOTTOM FIXED) ===== */
.links {
  position: fixed;
  bottom: 15px;
  left: 0;
  width: 100%;
  display: flex;
  justify-content: center;
  gap: 20px;
}

.links a {
  text-decoration: none;
  background: white;
  color: black;
  padding: 10px 18px;
  border-radius: 20px;
  font-weight: bold;
  font-size: 14px;
}

/* ===== CATEGORY BAR ===== */
.categories {
  display: flex;
  overflow-x: auto;
  padding: 10px;
  justify-content: center;
}

.categories div {
  padding: 12px 22px;
  margin: 5px;
  background: rgba(255,255,255,0.3);
  border-radius: 25px;
  cursor: pointer;
  white-space: nowrap;
  font-size: 15px;
}

.categories div.active {
  background: white;
  color: black;
}

/* ===== SLIDER ===== */
.slider {
  position: relative;
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* ===== CARD ===== */
.card {
  width: 320px; /* bigger */
  background: white;
  color: black;
  padding: 20px;
  border-radius: 20px;
  text-align: center;
  animation: fade 0.4s;
}

.card img {
  width: 100%;
  border-radius: 15px;
}

.card h3 {
  margin: 15px 0 5px;
}

.card p {
  font-size: 18px;
  font-weight: bold;
}

/* ===== ARROWS ===== */
.arrow {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  background: black;
  color: white;
  padding: 12px;
  cursor: pointer;
  border-radius: 50%;
  font-size: 18px;
}

.left { left: 15px; }
.right { right: 15px; }

/* ===== ANIMATION ===== */
@keyframes fade {
  from { opacity: 0; transform: scale(0.9); }
  to { opacity: 1; transform: scale(1); }
}

</style>
</head>

<body>

<!-- ===== HOME ===== -->
<div id="home">
  <img src="./logo.jpg" onclick="openMenu()">
</div>

<!-- ===== MENU ===== -->
<div id="menu">
  <div class="overlay">

    <div class="header">
      <h1>Bean Board Menu</h1>
    </div>

    <div class="categories">
      <div onclick="load('hot', this)">Hot Drinks</div>
      <div onclick="load('cold', this)">Cold Drinks</div>
      <div onclick="load('food', this)">Food</div>
    </div>

    <div class="slider">
      <div class="arrow left" onclick="move(-1)">❮</div>
      <div class="arrow right" onclick="move(1)">❯</div>

      <div id="box">
        <h2>Click a category ☕</h2>
      </div>
    </div>

    <!-- LINKS (BOTTOM, NO OVERLAP) -->
    <div class="links">
      <a href="https://www.instagram.com/beanboard_vip?utm_source=ig_web_button_share_sheet&igsh=ZDNlZDc0MzIxNw==" target="_blank">Instagram</a>
      <a href="https://maps.google.com" target="_blank">Location</a>
    </div>

  </div>
</div>

<script>

/* PAGE TRANSITION */
function openMenu() {
  document.getElementById("home").style.top = "-100%";
  document.getElementById("menu").style.top = "0";
}

/* DATA */
let current = 0;
let items = [];

let data = {

  hot: [
    ["Espresso",100,"https://images.unsplash.com/photo-1511920170033-f8396924c348"],
    ["Latte",140,"https://images.unsplash.com/photo-1509042239860-f550ce710b93"],
    ["Cappuccino",140,"https://images.unsplash.com/photo-1495474472287-4d71bcdd2085"],
    ["Mocha",180,"https://images.unsplash.com/photo-1572441710534-68079b0b3e1f"]
  ],

  cold: [
    ["Cold Brew",210,"https://images.unsplash.com/photo-1461023058943-07fcbe16d735"],
    ["Mint Cold Brew",160,"https://images.unsplash.com/photo-1517701604599-bb29b565090c"],
    ["Espresso Tonic",250,"https://images.unsplash.com/photo-1527169402691-feff5539e52c"]
  ],

  food: [
    ["Fries",200,"https://images.unsplash.com/photo-1541592106381-b31e9677c0e5"],
    ["Sandwich",380,"https://images.unsplash.com/photo-1550547660-d9450f859349"],
    ["French Toast",260,"https://images.unsplash.com/photo-1482049016688-2d3e1b311543"]
  ]

};

/* LOAD CATEGORY */
function load(type, el) {

  document.querySelectorAll(".categories div")
    .forEach(x => x.classList.remove("active"));

  el.classList.add("active");

  items = data[type];
  current = 0;

  show();
}

/* SHOW ITEM */
function show() {

  if(items.length === 0) return;

  let item = items[current];

  document.getElementById("box").innerHTML = `
    <div class="card">
      <img src="${item[2]}">
      <h3>${item[0]}</h3>
      <p>₹${item[1]}</p>
    </div>
  `;
}

/* SLIDE */
function move(dir) {

  if(items.length === 0) return;

  current += dir;

  if(current < 0) current = items.length - 1;
  if(current >= items.length) current = 0;

  show();
}

</script>

</body>
</html>
