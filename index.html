<!DOCTYPE html>
<html>
<head>
<title>Bean Board VIP</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body {
  margin: 0;
  font-family: Arial;
  overflow: hidden;
}

/* ===== HOME ===== */
#home {
  height: 100vh;
  background: linear-gradient(135deg,#1e1e1e,#3a2f2f);
  display: flex;
  justify-content: center;
  align-items: center;
  position: absolute;
  width: 100%;
  top: 0;
  transition: 0.8s;
  z-index: 2;
}

#home img {
  width: 220px;
  cursor: pointer;
}

/* ===== MENU ===== */
#menu {
  height: 100vh;
  width: 100%;
  position: absolute;
  top: 100%;
  background: url('./bg.jpg') center/cover no-repeat;
  transition: 0.8s;
  overflow-y: auto;
}

.overlay {
  min-height: 140vh;
  background: rgba(0,0,0,0.6);
  color: white;
}

/* ===== CATEGORY ===== */
.categories {
  display: flex;
  gap: 10px;
  padding: 10px;
  justify-content: center;
}

.categories div {
  padding: 8px 14px;
  background: rgba(255,255,255,0.2);
  border-radius: 18px;
  cursor: pointer;
  font-size: 14px;
}

.categories .active {
  background: white;
  color: black;
}

/* ===== SLIDER ===== */
.slider {
  overflow: hidden;
  position: relative;
  display: flex;
  justify-content: center;
}

.track {
  display: flex;
  gap: 20px;
  padding: 20px;
  transition: transform 0.4s ease-in-out;
}

/* ===== SMALL CARD ===== */
.card {
  min-width: 240px;
  max-width: 240px;
  padding: 12px;
  border-radius: 15px;
  text-align: center;

  backdrop-filter: blur(12px);
  background: rgba(255,255,255,0.15);
}

.card img {
  width: 100%;
  height: 130px;
  object-fit: cover;
  border-radius: 12px;
}

.card h3 {
  font-size: 15px;
  margin: 6px 0;
}

.card p {
  font-size: 14px;
  font-weight: bold;
}

/* ===== ARROWS ===== */
.arrow {
  position: absolute;
  top: 45%;
  background: rgba(0,0,0,0.8);
  color: white;
  padding: 10px;
  border-radius: 50%;
  cursor: pointer;
  z-index: 10;
}

.left { left: 10px; }
.right { right: 10px; }

/* ===== CONTACT ===== */
.contact {
  text-align: center;
  padding: 30px 20px;
}

.contact a {
  display: block;
  margin: 8px;
  color: white;
  text-decoration: none;
}

/* ===== FOOTER ===== */
.footer {
  text-align: center;
  padding: 15px;
}

</style>
</head>

<body>

<!-- HOME -->
<div id="home">
  <img src="./logo.jpg" onclick="openMenu()">
</div>

<!-- MENU -->
<div id="menu">
  <div class="overlay">

    <h1 style="text-align:center;">Menu</h1>

    <div class="categories">
      <div onclick="load('hot',this)">Hot</div>
      <div onclick="load('cold',this)">Cold</div>
      <div onclick="load('food',this)">Food</div>
    </div>

    <div class="slider">
      <div class="arrow left" onclick="move(-1)">❮</div>
      <div class="arrow right" onclick="move(1)">❯</div>

      <div class="track" id="track">
        <h2 style="margin:auto">Click category ☕</h2>
      </div>
    </div>

    <!-- CONTACT -->
    <div class="contact">
      <h2>Contact</h2>

      <a href="https://www.instagram.com/beanboard_vip?utm_source=ig_web_button_share_sheet&igsh=ZDNlZDc0MzIxNw==" target="_blank">
        Instagram 📸
      </a>

      <a href="https://maps.google.com" target="_blank">
        Location 📍
      </a>

      <p>📞 +91 1234567890</p>
      <p>📧 abc@gmail.com</p>
    </div>

    <div class="footer">
      Bean Board VIP ☕
    </div>

  </div>
</div>

<script>

/* PAGE TRANSITION */
function openMenu(){
  home.style.top = "-100%";
  menu.style.top = "0";
}

/* DATA */
let index = 0;
let items = [];

let data = {
  hot:[
    ["Espresso",100,"https://images.unsplash.com/photo-1511920170033-f8396924c348"],
    ["Latte",140,"https://images.unsplash.com/photo-1509042239860-f550ce710b93"]
  ],
  cold:[
    ["Cold Brew",210,"https://images.unsplash.com/photo-1461023058943-07fcbe16d735"],
    ["Mint Brew",160,"https://images.unsplash.com/photo-1517701604599-bb29b565090c"]
  ],
  food:[
    ["Fries",200,"https://images.unsplash.com/photo-1541592106381-b31e9677c0e5"],
    ["Sandwich",380,"https://images.unsplash.com/photo-1550547660-d9450f859349"]
  ]
}

/* LOAD CATEGORY */
function load(type,el){

  document.querySelectorAll(".categories div")
    .forEach(x=>x.classList.remove("active"))

  el.classList.add("active")

  items = data[type]
  index = 0

  render()
}

/* RENDER */
function render(){

  let html=""

  items.forEach(item=>{
    html += `
      <div class="card">
        <img src="${item[2]}">
        <h3>${item[0]}</h3>
        <p>₹${item[1]}</p>
      </div>
    `
  })

  track.innerHTML = html
  update()
}

/* MOVE SLIDE */
function move(dir){
  index += dir

  if(index < 0) index = 0
  if(index > items.length - 1) index = items.length - 1

  update()
}

/* UPDATE POSITION */
function update(){
  track.style.transform = `translateX(-${index * 260}px)`
}

</script>

</body>
</html>
