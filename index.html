<!DOCTYPE html>
<html>
<head>
<title>Bean Board</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* RESET */
body {
  margin: 0;
  font-family: Arial;
  overflow: hidden;
}

/* ===== HOME PAGE ===== */
#home {
  height: 100vh;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  position: absolute;
  width: 100%;
  top: 0;
  left: 0;
  transition: 0.8s;
  z-index: 2;
}

#home img {
  width: 220px;
  cursor: pointer;
  transition: 0.3s;
}

#home img:hover {
  transform: scale(1.1);
}

/* ===== MENU PAGE ===== */
#menu {
  height: 100vh;
  width: 100%;
  position: absolute;
  top: 100%;
  left: 0;
  background: url('./bg.jpg') center/cover no-repeat;
  transition: 0.8s;
}

/* OVERLAY */
.overlay {
  background: rgba(0,0,0,0.6);
  height: 100%;
  color: white;
}

/* HEADING */
h1 {
  text-align: center;
  padding: 20px;
}

/* CATEGORY BAR */
.categories {
  display: flex;
  overflow-x: auto;
  padding: 10px;
}

.categories div {
  padding: 10px 20px;
  margin: 5px;
  background: rgba(255,255,255,0.3);
  border-radius: 20px;
  cursor: pointer;
  white-space: nowrap;
}

.categories div.active {
  background: white;
  color: black;
}

/* SLIDER */
.slider {
  position: relative;
  margin: 30px;
  height: 320px;
}

/* CARD */
.card {
  width: 260px;
  background: white;
  color: black;
  padding: 15px;
  border-radius: 15px;
  text-align: center;
  margin: auto;
}

.card img {
  width: 100%;
  border-radius: 10px;
}

/* ARROWS */
.arrow {
  position: absolute;
  top: 40%;
  background: black;
  color: white;
  padding: 10px;
  cursor: pointer;
  border-radius: 50%;
}

.left { left: 10px; }
.right { right: 10px; }

</style>
</head>

<body>

<!-- HOME PAGE -->
<div id="home">
  <img src="./logo.jpg" onclick="openMenu()">
</div>

<!-- MENU PAGE -->
<div id="menu">
  <div class="overlay">

    <h1>Menu</h1>

    <div class="categories">
      <div onclick="load('hot', this)">Hot Drinks</div>
      <div onclick="load('cold', this)">Cold Drinks</div>
      <div onclick="load('food', this)">Food</div>
    </div>

    <div class="slider">

      <div class="arrow left" onclick="move(-1)">❮</div>
      <div class="arrow right" onclick="move(1)">❯</div>

      <div id="box" style="text-align:center; margin-top:50px;">
        <h2>Click a category ☕</h2>
      </div>

    </div>

  </div>
</div>

<script>

/* PAGE TRANSITION */
function openMenu() {
  document.getElementById("home").style.top = "-100%";
  document.getElementById("menu").style.top = "0";
}

/* DATA */
let current = 0;
let items = [];

let data = {

  hot: [
    ["Espresso",100,"https://images.unsplash.com/photo-1511920170033-f8396924c348"],
    ["Latte",140,"https://images.unsplash.com/photo-1509042239860-f550ce710b93"],
    ["Cappuccino",140,"https://images.unsplash.com/photo-1495474472287-4d71bcdd2085"]
  ],

  cold: [
    ["Cold Brew",210,"https://images.unsplash.com/photo-1461023058943-07fcbe16d735"],
    ["Mint Cold Brew",160,"https://images.unsplash.com/photo-1517701604599-bb29b565090c"]
  ],

  food: [
    ["Fries",200,"https://images.unsplash.com/photo-1541592106381-b31e9677c0e5"],
    ["Sandwich",380,"https://images.unsplash.com/photo-1550547660-d9450f859349"]
  ]

};

/* LOAD CATEGORY */
function load(type, el) {

  document.querySelectorAll(".categories div")
    .forEach(x => x.classList.remove("active"));

  el.classList.add("active");

  items = data[type];
  current = 0;

  show();
}

/* SHOW ITEM */
function show() {

  if(items.length === 0) return;

  let item = items[current];

  document.getElementById("box").innerHTML = `
    <div class="card">
      <img src="${item[2]}">
      <h3>${item[0]}</h3>
      <p>₹${item[1]}</p>
    </div>
  `;
}

/* SLIDE */
function move(dir) {

  if(items.length === 0) return;

  current += dir;

  if(current < 0) current = items.length - 1;
  if(current >= items.length) current = 0;

  show();
}

</script>

</body>
</html>
