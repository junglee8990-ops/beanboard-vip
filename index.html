<!DOCTYPE html>
<html>
<head>
<title>Bean Board VIP</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body {
  margin: 0;
  font-family: Arial;
  overflow: hidden;
}

/* HOME */
#home {
  height: 100vh;
  background: linear-gradient(135deg,#1e1e1e,#3a2f2f);
  display: flex;
  justify-content: center;
  align-items: center;
  position: absolute;
  width: 100%;
  top: 0;
  transition: 0.8s;
  z-index: 2;
}

#home img {
  width: 230px;
  cursor: pointer;
}

/* MENU */
#menu {
  height: 100vh;
  width: 100%;
  position: absolute;
  top: 100%;
  background: url('./bg.jpg') center/cover no-repeat;
  transition: 0.8s;
}

.overlay {
  background: rgba(0,0,0,0.7);
  height: 100%;
  color: white;
  display: flex;
  flex-direction: column;
}

/* HEADING */
h1 {
  text-align: center;
  margin: 10px;
}

/* CATEGORY BAR */
.categories {
  display: flex;
  overflow-x: auto;
  padding: 10px;
  gap: 10px;
}

.categories div {
  padding: 10px 20px;
  background: rgba(255,255,255,0.3);
  border-radius: 20px;
  cursor: pointer;
  white-space: nowrap;
}

.categories div.active {
  background: white;
  color: black;
}

/* SLIDER CONTAINER */
.slider {
  flex: 1;
  overflow: hidden;
  position: relative;
}

/* SLIDE TRACK */
.track {
  display: flex;
  transition: transform 0.5s ease;
}

/* CARD */
.card {
  min-width: 80%;
  margin: 0 10%;
  background: white;
  color: black;
  padding: 20px;
  border-radius: 20px;
  text-align: center;
}

.card img {
  width: 100%;
  border-radius: 15px;
}

/* ARROWS */
.arrow {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  background: black;
  padding: 10px;
  border-radius: 50%;
  cursor: pointer;
}

.left { left: 10px; }
.right { right: 10px; }

/* LINKS */
.links {
  position: fixed;
  bottom: 10px;
  width: 100%;
  display: flex;
  justify-content: center;
  gap: 15px;
}

.links a {
  background: white;
  color: black;
  padding: 8px 15px;
  border-radius: 20px;
  text-decoration: none;
}

</style>
</head>

<body>

<!-- HOME -->
<div id="home">
  <img src="./logo.jpg" onclick="openMenu()">
</div>

<!-- MENU -->
<div id="menu">
  <div class="overlay">

    <h1 id="title">Menu</h1>

    <div class="categories">
      <div onclick="load('hot',this)">Hot</div>
      <div onclick="load('cold',this)">Cold</div>
      <div onclick="load('food',this)">Food</div>
    </div>

    <div class="slider">
      <div class="arrow left" onclick="move(-1)">❮</div>
      <div class="arrow right" onclick="move(1)">❯</div>

      <div class="track" id="track"></div>
    </div>

    <div class="links">
      <a href="https://www.instagram.com/beanboard_vip?utm_source=ig_web_button_share_sheet&igsh=ZDNlZDc0MzIxNw==" target="_blank">Instagram</a>
      <a href="https://maps.google.com" target="_blank">Location</a>
    </div>

  </div>
</div>

<script>

/* OPEN MENU */
function openMenu(){
  home.style.top="-100%";
  menu.style.top="0";
}

/* DATA */
let index=0;

let data={
  hot:[
    ["Espresso",100,"https://images.unsplash.com/photo-1511920170033-f8396924c348"],
    ["Latte",140,"https://images.unsplash.com/photo-1509042239860-f550ce710b93"]
  ],
  cold:[
    ["Cold Brew",210,"https://images.unsplash.com/photo-1461023058943-07fcbe16d735"],
    ["Mint Brew",160,"https://images.unsplash.com/photo-1517701604599-bb29b565090c"]
  ],
  food:[
    ["Fries",200,"https://images.unsplash.com/photo-1541592106381-b31e9677c0e5"],
    ["Sandwich",380,"https://images.unsplash.com/photo-1550547660-d9450f859349"]
  ]
}

/* LOAD CATEGORY */
function load(type,el){

  document.querySelectorAll(".categories div").forEach(x=>x.classList.remove("active"))
  el.classList.add("active")

  index=0

  let html=""

  data[type].forEach(item=>{
    html+=`
      <div class="card">
        <img src="${item[2]}">
        <h3>${item[0]}</h3>
        <p>₹${item[1]}</p>
      </div>
    `
  })

  track.innerHTML=html
  update()
}

/* MOVE */
function move(dir){
  index+=dir

  let total=document.querySelectorAll(".card").length

  if(index<0) index=0
  if(index>=total) index=total-1

  update()
}

/* UPDATE POSITION */
function update(){
  track.style.transform=`translateX(-${index*100}%)`
}

</script>

</body>
</html>
